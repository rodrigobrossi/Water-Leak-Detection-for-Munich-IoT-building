<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Building Damage Protection</title>
</head>
<body>
<link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans" rel="stylesheet"/>
<table style="font-family: 'IBM Plex Sans Condensed', -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Oxygen-Sans, Ubuntu, Cantarell, Helvetica Neue, sans-serif !important;margin: 0;padding: 0;width: 100%;cellspacing: 0;cellpadding: 0;">
    <tr>
        <td style="padding: 10px;background-color: rgb(24,41,53);height: 50px;color: white;">
            <p style="margin: auto;width: 500px;font-size: 20px;">Water Damage Prevention System<p>
        </td>
    </tr>
    <tr>
        <td>
            <table style="margin: auto;width: 500px;height:50px">
                <tr>
                    <td style="padding: 20px 0 10px 10px;">
                        Hello {{name}},
                    </td>
                </tr>
                <tr>
                    <td style="padding: 10px 30px 10px 30px;">
                        {{handler}} snoozed notifications for the next 24 hours and has been assigned as a handler for this incident.
                    </td>
                </tr>
                <tr>
                    <td style="padding: 20px 20px 10px 10px;">
                        <a style="display: block;width: 190px;text-align: center;border-radius: 5px;color: white;text-transform: uppercase;text-decoration: none;background-color: black;padding: 10px 10px 10px 10px;" href={{link}}>More information</a>
                        <p style="font-size: 10px">To go to water damage prevention system click the button above.</p>
                    </td>
                </tr>
            </table>      
        </td>
    </tr>
    <tr>
    <td style="padding: 10px;background-color: rgb(24,41,53);height: 50px;color: white;">
        <p style="margin: auto;width: 500px; font-size: 10px; text-align: right;">Maintained by Department of WoW </br> IBM Watson IoT Center<p>
    </td>
    </tr>
</table>
</body>
</html>
