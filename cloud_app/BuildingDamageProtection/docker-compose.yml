services:

  db2:
    image: icr.io/db2_community/db2
    container_name: bdp-db2
    privileged: true
    environment:
      - LICENSE=accept
      - DB2INST1_PASSWORD=bdppassword
      - DBNAME=BLUDB
    ports:
      - "50000:50000"
    volumes:
      - db2_data:/database
    shm_size: "256m"
    healthcheck:
      test: ["CMD", "su", "-", "db2inst1", "-c", "db2 connect to BLUDB"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  app:
    build: .
    container_name: bdp-app
    ports:
      - "5001:5000"
    volumes:
      - ./resources/config/config.json:/app/resources/config/config.json
    depends_on:
      db2:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    restart: on-failure

volumes:
  db2_data:
